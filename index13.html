<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Whack-A-Mole Deluxe | Pro Arcade</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --danger: #ef4444; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 800px; height: 650px; background: #1e293b; border-radius: 20px; border: 2px solid var(--accent); position: relative; display: flex; flex-direction: column; }
        .hud { display: flex; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.3); border-bottom: 2px solid var(--accent); }
        .grid { display: grid; gap: 15px; padding: 30px; flex-grow: 1; }
        .hole { background: #0f172a; border-radius: 50%; border: 4px solid #334155; position: relative; overflow: hidden; cursor: crosshair; }
        .mole { width: 100%; height: 100%; position: absolute; bottom: -100%; display: flex; justify-content: center; align-items: center; font-size: 40px; transition: 0.2s; }
        .mole.up { bottom: 0; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; gap: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; }
        #high-score-display { font-size: 1.2rem; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="high-score">0</span></div>
        <div>TIME: <span id="time">60</span>s</div>
    </div>
    <div id="board" class="grid"></div>
    <div id="overlay">
        <h1>WHACK-A-MOLE DELUXE</h1>
        <div id="high-score-display">ALL-TIME BEST: 0</div>
        <div id="difficulty-menu">
            <button onclick="Game.init(3, 1000)">EASY</button>
            <button onclick="Game.init(4, 700)">MEDIUM</button>
            <button onclick="Game.init(5, 400)">HARD</button>
        </div>
    </div>
</div>

<script>
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const StorageManager = {
        getHighScore() { return localStorage.getItem('whackHighScore') || 0; },
        setHighScore(score) { localStorage.setItem('whackHighScore', score); }
    };

    const SoundManager = {
        play(freq, type, duration) {
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(AudioCtx.destination);
            osc.start(); osc.stop(AudioCtx.currentTime + duration);
        }
    };

    const Game = {
        score: 0, time: 60, active: false, speed: 1000,
        
        init(gridSize, speed) {
            this.speed = speed;
            this.score = 0;
            this.time = 60;
            document.getElementById('score').innerText = '0';
            document.getElementById('high-score').innerText = StorageManager.getHighScore();
            document.getElementById('high-score-display').innerText = `ALL-TIME BEST: ${StorageManager.getHighScore()}`;
            
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            for(let i=0; i < gridSize * gridSize; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.innerText = '🐹';
                mole.onclick = () => this.hit(mole);
                hole.appendChild(mole);
                board.appendChild(hole);
            }
            this.start();
        },

        start() {
            document.getElementById('overlay').style.display = 'none';
            this.active = true;
            this.loop();
            const timer = setInterval(() => {
                this.time--;
                document.getElementById('time').innerText = this.time;
                if(this.time <= 0) { 
                    this.active = false; 
                    clearInterval(timer);
                    this.checkHighScore();
                    alert('Game Over! Score: ' + this.score); 
                    location.reload(); 
                }
            }, 1000);
        },

        hit(mole) {
            if(!mole.classList.contains('up')) return;
            SoundManager.play(600, 'sine', 0.1);
            this.score += 10;
            document.getElementById('score').innerText = this.score;
            mole.classList.remove('up');
        },

        checkHighScore() {
            if(this.score > StorageManager.getHighScore()) {
                StorageManager.setHighScore(this.score);
            }
        },

        loop() {
            if(!this.active) return;
            const moles = document.querySelectorAll('.mole');
            const target = moles[Math.floor(Math.random() * moles.length)];
            target.classList.add('up');
            setTimeout(() => target.classList.remove('up'), this.speed);
            setTimeout(() => this.loop(), this.speed + 100);
        }
    };
    
    // Set initial display
    document.getElementById('high-score').innerText = StorageManager.getHighScore();
</script>
</body>
</html>
